services:
  - type: web
    name: gaming-console-hub
    runtime: php
    buildCommand: composer install --no-dev
    startCommand: php artisan serve --host=0.0.0.0 --port=$PORT
    envVars:
      - key: DB_CONNECTION
        value: mysql
      - key: DB_HOST
        fromDatabase:
          name: gaming-console-hub-db
          property: host
      - key: DB_PORT
        fromDatabase:
          name: gaming-console-hub-db
          property: port
      - key: DB_DATABASE
        fromDatabase:
          name: gaming-console-hub-db
          property: database
      - key: DB_USERNAME
        fromDatabase:
          name: gaming-console-hub-db
          property: username
      - key: DB_PASSWORD
        fromDatabase:
          name: gaming-console-hub-db
          property: password

  - type: pserv
    name: gaming-console-hub-db
    runtime: php
    buildCommand: composer install --no-dev
    startCommand: php artisan serve --host=0.0.0.0 --port=$PORT
    envVars:
      - key: APP_KEY
        generateValue: true
